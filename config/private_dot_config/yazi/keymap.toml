[[mgr.prepend_keymap]]
on = "l"
run = "plugin bypass --args=smart-enter"
desc = "Enter directory (skip single-child) or open file"

[[mgr.prepend_keymap]]
on = "F"
run = "plugin smart-filter"
desc = "Smart filter"

[[mgr.prepend_keymap]]
on = "<C-d>"
run = "plugin diff"
desc = "Diff selected with hovered file"

#[[mgr.prepend_keymap]]
#on = "~"
#run = "plugin chmod"
#desc = "Chmod selected files"

[[mgr.prepend_keymap]]
on = "p"
run = "plugin smart-paste"
desc = "Paste into hovered dir or CWD"

[[mgr.prepend_keymap]]
on = "T"
run = "plugin toggle-pane max-preview"
desc = "Toggle fullscreen preview"

[[mgr.prepend_keymap]]
on = "t"
run = "plugin mactag"
desc = "Tag selected files"

[[mgr.prepend_keymap]]
on = "d"
run = "plugin mactag --args=delete"
desc = "Remove tags from selected files"

[[mgr.prepend_keymap]]
on = ["g", "c"]
run = "plugin vcs-files"
desc = "Show git changed files"

[[mgr.prepend_keymap]]
on = ["g", "r"]
run = "shell 'ya emit cd \"$(git rev-parse --show-toplevel)\"' --confirm"
desc = "Go to git root"

# Relative motions (vim-style 3j, 5k, etc.)
[[mgr.prepend_keymap]]
on = "1"
run = "plugin relative-motions 1"
desc = "Move in relative steps"

