[mgr]
show_hidden = true
ratio = [0, 1, 0]

[opener]
edit = [
  { run = 'hx "$@"', block = true, for = "unix" },
]

[open]
rules = [
  { mime = "text/*", use = "edit" },
  { url = "*.{md,kdl,toml,yaml,yml,json,sh,ts,tsx,js,jsx,go,py,rs,kt,tf}", use = "edit" },
]

# Piper previewers
[[plugin.prepend_previewers]]
url = "*/"
run = 'piper -- eza -TL=3 --color=always --icons=always --group-directories-first "$1"'

[[plugin.prepend_previewers]]
url = "*.tar*"
run = 'piper --format=url -- tar tf "$1"'

[[plugin.prepend_previewers]]
url = "*.csv"
run = 'piper -- bat -p --color=always "$1"'

[[plugin.prepend_previewers]]
mime = "application/sqlite3"
run = 'piper -- sqlite3 "$1" ".schema --indent"'

[[plugin.append_previewers]]
url = "*"
run = 'piper -- hexyl --border=none --terminal-width=$w "$1"'

# Git status fetchers
[[plugin.prepend_fetchers]]
id = "git"
url = "*"
run = "git"

[[plugin.prepend_fetchers]]
id = "git"
url = "*/"
run = "git"

# macOS tag fetcher
[[plugin.prepend_fetchers]]
id = "mactag"
url = "*"
run = "mactag"

[[plugin.prepend_fetchers]]
id = "mactag"
url = "*/"
run = "mactag"
